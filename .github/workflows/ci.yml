name: TRUF GAMING — CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  # ────────────────────────────────────────────────────────────
  # JOB 1: Lint & Type Check
  # ────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.0

      - name: Install dependencies
        run: pnpm install

      - name: Run ESLint
        run: pnpm --filter web run lint

      - name: Check Auth Imports
        run: pnpm --filter web run check-auth

      - name: TypeScript type check
        run: pnpm --filter web typecheck

  # ────────────────────────────────────────────────────────────
  # JOB 2: Build
  # ────────────────────────────────────────────────────────────
  build:
    name: Build All Apps
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.0

      - name: Install dependencies
        run: pnpm install

      - name: Build monorepo (Turborepo)
        run: npx turbo run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Upload Next.js build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: apps/web/.next
          retention-days: 1

  # ────────────────────────────────────────────────────────────
  # JOB 3: Test
  # ────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: truf_gaming_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.1.0

      - name: Install dependencies
        run: pnpm install

      - name: Run unit & integration tests
        run: pnpm --filter web test
        env:
          DATABASE_URL: postgresql://admin:testpassword@localhost:5432/truf_gaming_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-key
          NODE_ENV: test

  # ────────────────────────────────────────────────────────────
  # JOB 4: Deploy (only on push to main)
  # ────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Web to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: apps/web
          vercel-args: "--prod"
